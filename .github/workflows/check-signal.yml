# ============================================================
#  GitHub Actions Workflow  -  cRSI + Stoch RSI Signal Bot
# ============================================================
#  Trigger:
#    - Schedule: ทุก 15 นาที (ที่นาที 05, 20, 35, 50 UTC)
#      เลื่อนจาก :00/:15/:30/:45 ออกไป 5 นาทีเพื่อรอให้แท่งเทียน
#      ปิดตัวและ exchange update ข้อมูลเสร็จก่อน
#    - Manual: คลิก "Run workflow" ในแท็บ Actions ของ repo
# ============================================================

name: Check Trading Signal

on:
  schedule:
    # 5 นาทีหลังจากแท่ง 15m แต่ละแท่งปิด (UTC)
    # Bybit แท่ง 15m ปิดที่ :00, :15, :30, :45 UTC
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:
    # อนุญาตให้ trigger manual ได้จาก GitHub UI
    inputs:
      dry_run:
        description: 'Dry-run mode (ไม่ส่งแจ้งเตือนจริง)'
        required: false
        type: boolean
        default: false

# ป้องกันการรันซ้อนทับกัน (ถ้า cron ก่อนหน้ายังไม่เสร็จ)
concurrency:
  group: check-signal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # --- 1. Checkout โค้ด ---
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # --- 2. Setup Python ---
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'                          # cache pip dependencies
          cache-dependency-path: requirements.txt

      # --- 3. Install dependencies ---
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- 4. Run signal check ---
      - name: 🎯 Run signal check
        env:
          # --- Exchange ---
          EXCHANGE:          ${{ vars.EXCHANGE }}
          SYMBOL:            ${{ vars.SYMBOL }}
          TIMEFRAME:         ${{ vars.TIMEFRAME }}
          TIMEFRAME_MINUTES: ${{ vars.TIMEFRAME_MINUTES }}
          OHLCV_LIMIT:       ${{ vars.OHLCV_LIMIT }}

          # --- Notification ---
          NOTIFY_CHANNEL:    ${{ vars.NOTIFY_CHANNEL }}
          TZ_OFFSET_HOURS:   ${{ vars.TZ_OFFSET_HOURS }}

          # --- Secrets (sensitive) ---
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_NOTIFY_TOKEN:  ${{ secrets.LINE_NOTIFY_TOKEN }}

          # --- Dry run from manual trigger ---
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: |
          echo "=== Run signal check ==="
          python check_signal.py

      # --- 5. (Optional) ส่ง failure alert ผ่าน GitHub Actions ---
      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "::error::Signal check failed - ดู logs ด้านบนเพื่อหาสาเหตุ"
          exit 1
