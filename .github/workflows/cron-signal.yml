# ============================================================
#  GitHub Actions Workflow  -  Cron Signal Check (Telegram)
# ============================================================
#  Trigger:
#    - Schedule: ทุก 5 นาที (หลังแท่ง 5m ปิด ~30 วินาที)
#      Bybit แท่ง 5m ปิดที่ :00, :05, :10, ... UTC
#      รอ 30 วินาทีให้ exchange update ข้อมูลก่อน
#    - Manual: คลิก "Run workflow" ในแท็บ Actions ของ repo
# ============================================================

name: Check Trading Signal

on:
  schedule:
    # รันทุก 5 นาที หลังเวลา :00, :05, :10, :15, ... UTC +30 วินาที buffer
    # ใช้รูปแบบ "*/5 * * * *" แต่ GitHub Actions อาจ delay 1-3 นาที
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode (ไม่ส่งแจ้งเตือนจริง)'
        required: false
        type: boolean
        default: false

# ป้องกันการรันซ้อนทับกัน
concurrency:
  group: check-signal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # --- 1. Checkout โค้ด ---
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # --- 2. Setup Python ---
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # --- 3. Install dependencies ---
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- 4. Run signal check ---
      - name: 🎯 Run signal check
        env:
          # --- Exchange (Variables) ---
          EXCHANGE:          ${{ vars.EXCHANGE }}
          SYMBOL:            ${{ vars.SYMBOL }}
          TIMEFRAME:         ${{ vars.TIMEFRAME }}
          TIMEFRAME_MINUTES: ${{ vars.TIMEFRAME_MINUTES }}
          OHLCV_LIMIT:       ${{ vars.OHLCV_LIMIT }}
          MAX_RECOVERY_BARS: ${{ vars.MAX_RECOVERY_BARS }}

          # --- Notification (Variables) ---
          NOTIFY_CHANNEL:    ${{ vars.NOTIFY_CHANNEL }}
          TZ_OFFSET_HOURS:   ${{ vars.TZ_OFFSET_HOURS }}

          # --- Secrets (sensitive) ---
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_NOTIFY_TOKEN:  ${{ secrets.LINE_NOTIFY_TOKEN }}

          # --- Dry run from manual trigger ---
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: |
          echo "=== Run signal check ==="
          python check_signal.py

      # --- 5. Notify on failure ---
      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "::error::Signal check failed - ดู logs ด้านบนเพื่อหาสาเหตุ"
          exit 1
